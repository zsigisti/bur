# /etc/nginx/conf.d/bur.conf on 192.168.0.79
# BUR on :82, plain HTTP (public TLS terminates at the Cloudflare edge).
# The existing :80 site (blueberry.conf) is left untouched.
server {
    listen 82;
    listen [::]:82;
    server_name bur.mmzsigmond.me;

    client_max_body_size 64m;   # allow .bpm uploads

    # Next.js app (bur-web.service) on localhost:3000.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # real client scheme (CF edge)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
