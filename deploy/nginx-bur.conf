# NOTE: BUR does NOT use nginx.
#
# Per the deployment spec ("port :82 for http, no https or forwarding"), the
# Next.js server binds 0.0.0.0:82 DIRECTLY (see bur-web.service). The existing
# nginx on :80 (blueberry.conf) is left completely untouched — nothing here is
# installed into /etc/nginx.
#
# Public routing to bur.mmzsigmond.me is handled at the Cloudflare edge
# (tunnel/proxy to 192.168.0.76:82), the same way the existing mirror is
# reached; the box itself does no TLS and no port forwarding.
